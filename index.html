<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Job Application Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Agdasima:wght@400;700&family=Geist:wght@100..900&display=swap" rel="stylesheet">

  <style>
    body {
      font-family: 'Geist', sans-serif;
    }
  </style>
</head>
<body class="max-w-6xl mx-auto px-4 bg-[#F8FAFC]">
    <section class="container py-[60px]">
        <h1 class="text-[32px] font-bold text-[#002C5C]">Job Application Tracker</h1>
        <div class="cards flex justify-between items-center grid grid-cols-3">
            <div class="bg-white rounded-[10px] w-[359.33px] h-[97px] px-[20px] py-[20px]">
                <p class="text-[14px] font-medium text-[#323B49]">Total</p>
                <h2 class="text-black font-medium text-[24px]">8</h2>
            </div>
            <div class="bg-white rounded-[10px] w-[359.33px] h-[97px] px-[20px] py-[20px]">
                <p class="text-[14px] font-medium text-[#323B49]">Interview</p>
                <h2 class="text-[#10B981] font-medium text-[24px]">0</h2>
            </div>
            <div class="bg-white rounded-[10px] w-[359.33px] h-[97px] px-[20px] py-[20px]">
                <p class="text-[14px] font-medium text-[#323B49]">Rejected</p>
                <h2 class="text-[#EF4444] font-medium text-[24px]">0</h2>
            </div>
        </div>
        </div>
    </section>
    <section class="Available Jobs">
        <h3>Available Jobs</h3>
<div class="flex justify-between items-center">
  
  <div class="flex gap-2 text[#64748B]">
    <button class="w-[80px] h-[32px] rounded-[5px] bg-white border border-gray">All</button>
    <button class="w-[80px] h-[32px] rounded-[5px] bg-white border border-gray">Interview</button>
    <button class="w-[80px] h-[32px] rounded-[5px] bg-white border border-gray">Rejected</button>
  </div>
  <p class="text-[#64748B] text-[16px]">8 jobs</p>
</div>
<div></div>
<div></div>
<div></div>
<div></div>
<div></div>
<div></div>
<div></div>
<div></div>
<div></div>



    </section>

</body>
</html>
